version: '3.8'

services:
  # 1. The Message Broker (Replaces Filebeat/Redis)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. The Edge Sensor
  zeek:
    build:
      context: ./zeek
      dockerfile: Dockerfile.zeek
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
    volumes:
      - ./pcaps:/pcaps 
      - ./zeek/kafka-routing.zeek:/scripts/kafka-routing.zeek
    depends_on:
      redpanda:
        condition: service_healthy
    command: tail -f /dev/null 

  # 3. The Intelligence Engine
  python-engine:
    build:
      context: ./python
      dockerfile: Dockerfile.python
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
    volumes:
      - ./python:/app
    depends_on:
      redpanda:
        condition: service_healthy
    command: tail -f /dev/null