filebeat.inputs:
- type: filestream
  id: zeek-ics-logs
  enabled: true
  paths:
    - /opt/zeek/logs/current/*.log
  parsers:
    - ndjson:
        target: "zeek"
        add_error_key: true

# Dump everything to a local file instead of a broker
# Only for debugging, not for production as it's too slow
output.file:
  path: "/usr/share/filebeat/dev_output"
  filename: "filebeat_zeek_dump.json"
  # Keep it in one file for easy debugging (no rotation)
  rotate_every_kb: 100000
  # Filebeat deletes files after 7 by default
  number_of_files: 100